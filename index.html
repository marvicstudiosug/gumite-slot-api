<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUMITE Slot · Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <div class="header">
            <h1>🎰 GUMITE</h1>
            <p>Professional Slot API · Demo</p>
        </div>

        <div class="balance-display">
            💰 Balance: <span id="balance">10,000</span> UGX
        </div>

        <div class="slot-grid" id="slotGrid">
            <div class="cell">🍒</div>
            <div class="cell">🍋</div>
            <div class="cell">🍊</div>
            <div class="cell">🍇</div>
            <div class="cell">🍀</div>
            <div class="cell">💎</div>
            <div class="cell">⭐</div>
            <div class="cell">🍒</div>
            <div class="cell">🍋</div>
        </div>

        <div class="controls">
            <input type="number" class="bet-input" id="betAmount" value="500" min="10" max="10000">
            <button class="btn btn-spin" id="spinBtn">🎰 SPIN</button>
        </div>

        <div class="result" id="result">Press SPIN to start</div>

        <div class="api-info">
            🔗 API Endpoint: <code>/api/spin</code><br>
            📊 House Edge: 6.5% · RTP: 93.5%
        </div>
    </div>

    <script>
        const API_URL = 'https://gumite-slot-api.onrender.com/api';
        const API_KEY = 'test_api_key_123';
        
        let balance = 10000;
        let spinning = false;

        const gridEl = document.getElementById('slotGrid');
        const spinBtn = document.getElementById('spinBtn');
        const betInput = document.getElementById('betAmount');
        const resultEl = document.getElementById('result');
        const balanceEl = document.getElementById('balance');

        function updateBalance() {
            balanceEl.textContent = balance.toLocaleString();
        }

        function renderGrid(grid) {
            const cells = gridEl.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                cell.textContent = grid[i] || '🍒';
                cell.classList.remove('win');
            });
        }

        async function spin() {
            if (spinning) return;
            
            const betAmount = parseInt(betInput.value);
            if (isNaN(betAmount) || betAmount < 10) {
                alert('Minimum bet is 10 UGX');
                return;
            }
            if (betAmount > balance) {
                alert('Insufficient balance');
                return;
            }

            spinning = true;
            spinBtn.disabled = true;
            resultEl.textContent = '🎡 Spinning...';
            resultEl.className = 'result';

            balance -= betAmount;
            updateBalance();

            try {
                const response = await fetch(`${API_URL}/spin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({
                        playerId: 'demo_player_1',
                        betAmount: betAmount
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    renderGrid(data.grid);
                    
                    if (data.win > 0) {
                        balance += data.win;
                        resultEl.textContent = `🎉 You won ${data.win.toLocaleString()} UGX!`;
                        resultEl.className = 'result win';
                        
                        if (data.winningLines && data.winningLines.length > 0) {
                            const cells = gridEl.querySelectorAll('.cell');
                            data.winningLines.forEach(line => {
                                line.positions.forEach(pos => {
                                    cells[pos].classList.add('win');
                                });
                            });
                        }
                    } else {
                        resultEl.textContent = '💨 No win. Try again!';
                        resultEl.className = 'result';
                    }
                    
                    updateBalance();
                } else {
                    resultEl.textContent = `Error: ${data.error}`;
                    resultEl.className = 'result';
                    balance += betAmount;
                    updateBalance();
                }

            } catch (error) {
                console.error('Spin error:', error);
                resultEl.textContent = '⚠️ Connection error. Make sure API is running.';
                resultEl.className = 'result';
                balance += betAmount;
                updateBalance();
            }

            spinning = false;
            spinBtn.disabled = false;
        }

        spinBtn.addEventListener('click', spin);
        updateBalance();
    </script>
</body>
</html>
