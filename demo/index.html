<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GUMITE · ELITE SLOT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --gold: #d4a943;
            --gold-bright: #ffd966;
            --gold-light: #f5e6b0;
            --bg-deep: #05020a;
            --bg-card: #0f081a;
            --accent: #f59e0b;
            --cell-bg: rgba(255, 255, 255, 0.42);
            --font-main: 'Inter', 'Poppins', system-ui, -apple-system, sans-serif;
            --radius-sm: 0.6rem;
            --radius-md: 1rem;
            --radius-lg: 2.2rem;
            --radius-xl: 2.6rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100dvh;
            padding: 0;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            background-image:
                radial-gradient(ellipse at 50% 20%, rgba(200, 140, 30, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse at 10% 80%, rgba(140, 60, 200, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 10%, rgba(200, 120, 40, 0.08) 0%, transparent 50%);
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(200, 140, 30, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: ambientGlow 5s ease-in-out infinite;
        }

        @keyframes ambientGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .game-container {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0.5rem 0.6rem 0.4rem;
            background: radial-gradient(ellipse at 50% 25%, #1c1228 0%, #0a0612 100%);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
            border-left: 2px solid rgba(200, 155, 50, 0.15);
            border-right: 2px solid rgba(200, 155, 50, 0.15);
            position: relative;
            z-index: 2;
            backdrop-filter: blur(4px);
            transition: box-shadow 0.4s ease, border-color 0.4s ease;
            overflow: hidden;
        }

        .game-container.jackpot-glow {
            box-shadow: 0 0 100px #f59e0b, 0 0 200px rgba(255, 150, 0, 0.4);
            border-left-color: #ffb700;
            border-right-color: #ffb700;
            animation: jackpotBorder 0.55s ease-in-out infinite alternate;
        }

        .game-container.gumite-bonus-active {
            box-shadow: 0 0 150px #ffdd00, 0 0 250px #ffaa00, 0 0 350px rgba(255, 100, 0, 0.5);
            border-left-color: #fff6cf;
            border-right-color: #fff6cf;
            animation: gumitePulse 0.3s ease-in-out infinite alternate;
        }

        @keyframes gumitePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }

        @keyframes jackpotBorder {
            0% { border-left-color: #ffb700; border-right-color: #ffb700; }
            100% { border-left-color: #fff6cf; border-right-color: #fff6cf; }
        }

        /* ─── HEADER ─── */
        .header {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding-bottom: 0.1rem;
        }

        .header-title {
            width: 100%;
            text-align: center;
        }

        .title {
            font-size: clamp(2rem, 6vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(180deg, #ffe9a0 0%, #e0b040 40%, #b8781a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 6px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4)) drop-shadow(0 0 40px rgba(255, 215, 0, 0.2));
            animation: titlePulse 2.5s ease-in-out infinite;
            line-height: 1.2;
        }

        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4)) drop-shadow(0 0 40px rgba(255, 215, 0, 0.2)); }
            50% { filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.7)) drop-shadow(0 0 60px rgba(255, 215, 0, 0.4)); }
        }

        .header-middle {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .balance-display {
            background: linear-gradient(180deg, #1a1025 0%, #090411 100%);
            padding: 0.25rem 1rem;
            border-radius: 2.5rem;
            border: 1px solid var(--gold);
            font-weight: 700;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #ffde8c;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            box-shadow: 0 0 16px rgba(200, 150, 30, 0.15);
            white-space: nowrap;
            height: 2.2rem;
        }

        .balance-display .bal-icon { font-size: 1rem; }

        .header-bottom {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 0.3rem;
        }

        .jackpot-display {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.2rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid #ffaa00;
            background: rgba(255, 170, 0, 0.08);
            color: #ffcc00;
            font-size: clamp(0.7rem, 1.8vw, 0.9rem);
            font-weight: 700;
            white-space: nowrap;
            animation: jackpotGlow 1.5s ease-in-out infinite;
            height: 2rem;
        }

        @keyframes jackpotGlow {
            0%, 100% { box-shadow: 0 0 8px #ffaa00; }
            50% { box-shadow: 0 0 20px #ffcc00, 0 0 30px #ff8800; }
        }

        .icon-btn {
            width: 2.4rem;
            height: 2.4rem;
            border-radius: 50%;
            border: 1px solid rgba(200, 155, 50, 0.3);
            background: rgba(10, 5, 20, 0.6);
            color: #efcf7a;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
            outline: none;
            position: absolute;
            top: 0;
            right: 0;
        }

        .icon-btn:hover {
            border-color: #ffd966;
            box-shadow: 0 0 16px rgba(255, 200, 50, 0.3);
        }
        .icon-btn:active { transform: scale(0.9); }

        /* ─── SLOT MACHINE ─── */
        .slot-machine-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.2rem 0;
            min-height: 0;
        }

        .slot-machine {
            background: radial-gradient(circle at 40% 30%, #281830, #110918);
            width: 100%;
            padding: 0.6rem;
            border-radius: var(--radius-lg);
            border: 2px solid #9e8d4b;
            box-shadow: inset 0 0 60px #020102, 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(200, 150, 30, 0.15);
            position: relative;
            aspect-ratio: 1 / 0.95;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            animation: borderGlow 3s ease-in-out infinite;
        }

        .slot-machine.gumite-bonus {
            border-color: #fff6cf;
            box-shadow: inset 0 0 100px #4a3a00, 0 0 80px rgba(255, 220, 0, 0.7), 0 0 150px rgba(255, 200, 0, 0.5);
            animation: gumiteBorderPulse 0.2s ease-in-out infinite alternate;
        }

        @keyframes gumiteBorderPulse {
            0% { border-color: #ffdd00; box-shadow: inset 0 0 100px #4a3a00, 0 0 80px rgba(255, 220, 0, 0.7), 0 0 150px rgba(255, 200, 0, 0.5); }
            100% { border-color: #fff6cf; box-shadow: inset 0 0 100px #6a4a00, 0 0 80px rgba(255, 220, 0, 0.7), 0 0 150px rgba(255, 200, 0, 0.5); }
        }

        @keyframes borderGlow {
            0%, 100% { border-color: #9e8d4b; box-shadow: inset 0 0 60px #020102, 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(200, 150, 30, 0.15); }
            50% { border-color: #ffb82e; box-shadow: inset 0 0 60px #4a2a00, 0 20px 40px rgba(200, 150, 30, 0.3), 0 0 60px rgba(200, 150, 30, 0.3); }
        }

        .slot-machine.win-border {
            border-color: #ffb82e;
            animation: winBorderPulse 0.6s ease-in-out 3;
            box-shadow: inset 0 0 60px #4a2a00, 0 0 30px rgba(200, 150, 30, 0.3);
        }

        @keyframes winBorderPulse {
            0%, 100% { border-color: #9e8d4b; box-shadow: inset 0 0 60px #020102, 0 20px 40px rgba(0, 0, 0, 0.7); }
            50% { border-color: #ffb82e; box-shadow: inset 0 0 60px #4a2a00, 0 20px 40px rgba(200, 150, 30, 0.3); }
        }

        .slot-machine.jackpot-border {
            border-color: #ffdd00;
            animation: jackpotBorderPulse 0.3s ease-in-out infinite alternate;
            box-shadow: inset 0 0 60px #4a3a00, 0 0 80px rgba(255, 200, 0, 0.5);
        }

        @keyframes jackpotBorderPulse {
            0% { border-color: #ffdd00; box-shadow: inset 0 0 60px #4a3a00, 0 0 80px rgba(255, 200, 0, 0.5); }
            100% { border-color: #fff6cf; box-shadow: inset 0 0 60px #6a4a00, 0 0 80px rgba(255, 220, 0, 0.7); }
        }

        .reels-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.3rem;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 2;
        }

        .reel-column {
            background: radial-gradient(circle at 35% 28%, #fff8e7, #cfb87c);
            border-radius: var(--radius-md);
            padding: 0.15rem;
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            gap: 0.15rem;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.18), 0 0 18px rgba(207, 170, 59, 0.35);
            position: relative;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.15s ease;
            border: 1px solid rgba(200, 150, 30, 0.3);
            animation: neonReelPulse 2.5s ease-in-out infinite;
        }

        @keyframes neonReelPulse {
            0%, 100% { border-color: rgba(200, 150, 30, 0.3); box-shadow: 0 0 10px rgba(200, 150, 30, 0.1); }
            50% { border-color: rgba(255, 200, 50, 0.6); box-shadow: 0 0 25px rgba(200, 150, 30, 0.3); }
        }

        .reel-column.spinning {
            animation: reelShake 0.06s linear infinite;
        }

        .reel-column.stopped {
            transition: transform 0.18s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.18s ease;
        }

        @keyframes reelShake {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-1.5px); }
            75% { transform: translateY(1.5px); }
        }

        .reel-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3.8rem, 11vw, 5.4rem);
            border-radius: var(--radius-sm);
            background: var(--cell-bg);
            backdrop-filter: blur(2px);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
            position: relative;
            font-weight: 500;
            will-change: transform, box-shadow;
        }

        .reel-cell.rare-symbol {
            background: linear-gradient(135deg, #ffe9a0, #f5d742, #ffb82e);
            color: #1a0a00;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 10px rgba(255, 200, 0, 0.3);
            animation: rarePulse 1s ease-in-out infinite;
            transform: scale(1.05);
        }

        @keyframes rarePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 10px rgba(255, 200, 0, 0.3); transform: scale(1.05); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.9), inset 0 0 20px rgba(255, 200, 0, 0.5); transform: scale(1.1); }
        }

        .reel-cell.win {
            box-shadow: 0 0 28px #ffb82e, 0 0 56px #ff7700;
            background: rgba(255, 220, 80, 0.55);
            transform: scale(1.08);
            animation: winPulse 0.4s ease-in-out;
            z-index: 3;
            border-radius: 0.7rem;
        }

        .reel-cell.jackpot {
            box-shadow: 0 0 44px #ffdd00, 0 0 80px #ffaa00;
            background: rgba(255, 220, 60, 0.72);
            transform: scale(1.12);
            animation: jackpotPulse 0.25s ease-in-out infinite;
            border-radius: 0.85rem;
            z-index: 4;
        }

        @keyframes winPulse {
            0%, 100% { transform: scale(1.08); }
            50% { transform: scale(1.15); }
        }

        @keyframes jackpotPulse {
            0%, 100% { transform: scale(1.12); }
            50% { transform: scale(1.22); }
        }

        .reel-cell.dropping {
            animation: dropIn 0.12s ease-out;
        }

        @keyframes dropIn {
            0% { transform: translateY(-15px) scale(0.85); opacity: 0.5; }
            60% { transform: translateY(3px) scale(1.04); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .win-lines-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            overflow: hidden;
        }

        .win-lines-overlay canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        .shimmer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(105deg,
                    transparent 0%, transparent 30%,
                    rgba(255, 255, 255, 0.05) 45%, rgba(255, 255, 255, 0.1) 50%,
                    rgba(255, 255, 255, 0.05) 55%, transparent 70%, transparent 100%);
            background-size: 300% 100%;
            border-radius: var(--radius-lg);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .shimmer-overlay.active {
            opacity: 1;
            animation: shimmerMove 0.6s ease forwards;
        }

        @keyframes shimmerMove {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ─── CONTROLS ─── */
        .controls-area {
            flex-shrink: 0;
            margin-top: 0.2rem;
        }

        .quick-bets {
            display: flex;
            gap: 0.2rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 0.5rem;
        }

        .quick-bet-btn {
            background: rgba(30, 20, 45, 0.8);
            border: 1px solid rgba(200, 155, 50, 0.3);
            color: #eacc8b;
            padding: 0.15rem 0.5rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: clamp(0.55rem, 1.5vw, 0.75rem);
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: var(--font-main);
            height: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quick-bet-btn:hover {
            background: rgba(200, 155, 50, 0.15);
            border-color: var(--gold-bright);
        }
        .quick-bet-btn:active { transform: scale(0.95); }

        .quick-bet-btn.active {
            background: #c99b3b;
            color: #1a1205;
            border-color: #ffd966;
            box-shadow: 0 0 12px rgba(200, 150, 50, 0.5);
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.1rem;
        }

        .btn {
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            outline: none;
            font-family: var(--font-main);
        }

        .btn:active { transform: scale(0.95); }

        .btn-spin {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: linear-gradient(180deg, #fce38d 0%, #c08a30 100%);
            color: #1f1404;
            font-size: 0.8rem;
            box-shadow: 0 5px 0 #7a5528, 0 0 20px rgba(255, 200, 50, 0.4);
            animation: spinBtnPulse 1.5s ease-in-out infinite;
            transition: all 0.08s ease;
            position: relative;
        }

        @keyframes spinBtnPulse {
            0%, 100% { box-shadow: 0 5px 0 #7a5528, 0 0 20px rgba(255, 200, 50, 0.4); }
            50% { box-shadow: 0 5px 0 #7a5528, 0 0 40px rgba(255, 200, 50, 0.6); }
        }

        .btn-spin:hover {
            transform: scale(1.05);
        }

        .btn-spin:active {
            transform: translateY(3px) scale(0.95);
            box-shadow: 0 2px 0 #5a3d1e, 0 0 15px rgba(255, 200, 50, 0.3);
        }

        .btn-spin:disabled {
            opacity: 0.5;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #5a3d1e;
            filter: grayscale(0.12);
            cursor: not-allowed;
            pointer-events: none;
            animation: none;
        }

        .btn-auto {
            background: linear-gradient(180deg, #2a1f38 0%, #1a0f24 100%);
            color: #efcf7a;
            border: 1px solid #b59246;
            padding: 0.3rem 1rem;
            border-radius: 2.5rem;
            font-size: 0.75rem;
            height: 2.2rem;
            transition: all 0.25s ease;
        }

        .btn-auto.active {
            background: #f09d2c;
            color: #1a1205;
            box-shadow: 0 0 26px #ff9900;
            border-color: #ffb700;
            animation: autoGlow 0.65s ease-in-out infinite alternate;
        }

        @keyframes autoGlow {
            0% { box-shadow: 0 0 18px #ff9900; }
            100% { box-shadow: 0 0 40px #ffbb33; }
        }

        .bet-input {
            padding: 0 0.5rem;
            border-radius: 2.5rem;
            border: 2px solid #cb9e41;
            background: rgba(0, 0, 0, 0.5);
            color: #fcdb69;
            font-size: 1.1rem;
            font-weight: 700;
            width: 80px;
            text-align: center;
            outline: none;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            font-family: var(--font-main);
            height: 2.8rem;
        }

        .bet-input:focus {
            border-color: #ffd966;
            box-shadow: 0 0 22px rgba(255, 200, 50, 0.4);
        }

        /* ─── MESSAGE ─── */
        .message {
            text-align: center;
            padding: 0.25rem;
            margin-top: 0.4rem;
            border-radius: 2.5rem;
            font-weight: 700;
            font-size: clamp(0.65rem, 1.8vw, 0.9rem);
            background: rgba(0, 0, 0, 0.48);
            backdrop-filter: blur(12px);
            color: #fce3b5;
            min-height: 2.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            letter-spacing: 0.3px;
            height: 2.2rem;
        }

        .message.win { background: rgba(255, 220, 80, 0.16); border-color: #ffdd55; color: #ffe28c; }
        .message.big-win { background: rgba(210, 80, 0, 0.65); border-color: #ff9900; color: #fff; font-size: 0.95rem; box-shadow: 0 0 26px rgba(255, 140, 0, 0.45); }
        .message.jackpot { background: #ffaa00; border-color: #fff; color: #1a0a00; font-size: 1.05rem; font-weight: 900; box-shadow: 0 0 40px rgba(255, 170, 0, 0.75); animation: msgJackpotPulse 0.45s ease-in-out infinite alternate; }
        @keyframes msgJackpotPulse {
            0% { box-shadow: 0 0 26px rgba(255, 170, 0, 0.6); }
            100% { box-shadow: 0 0 56px rgba(255, 200, 50, 0.95); }
        }
        .message.loss { background: rgba(80, 0, 0, 0.25); border-color: #661111; color: #dd9999; }
        .message.near-miss { background: rgba(200, 100, 0, 0.2); border-color: #cc8800; color: #ffcc66; }

        /* ─── DROPDOWN MENU OVERLAY ─── */
        .dropdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }

        .dropdown-overlay.active {
            display: flex;
        }

        .dropdown-card {
            background: radial-gradient(ellipse at 50% 30%, #1c1228, #0a0612);
            padding: 1.5rem;
            border-radius: 2.5rem;
            border: 1px solid rgba(200, 155, 50, 0.3);
            max-width: 380px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .dropdown-card h3 {
            color: var(--gold-bright);
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .menu-section {
            margin-bottom: 1rem;
        }

        .menu-section-title {
            color: #7a6e5a;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.3rem;
            border-bottom: 1px solid rgba(200, 155, 50, 0.1);
            padding-bottom: 0.2rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.3rem 0.2rem;
            border-radius: 0.8rem;

        .menu-btn-small {
            background: rgba(30, 20, 45, 0.6);
            border: 1px solid rgba(200, 155, 50, 0.2);

            padding: 0.15rem 0.5rem;
            border-radius: 1.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: var(--font-main);
            height: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn-small:hover {
            border-color: var(--gold-bright);
        }
        .menu-btn-small.active {
            background: #c99b3b;
            color: #1a1205;
            border-color: #ffd966;
        }

        .menu-action-btn {
            background: rgba(200, 155, 50, 0.1);
            border: 1px solid rgba(200, 155, 50, 0.2);
            color: #eacc8b;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: var(--font-main);
            width: 100%;
            text-align: center;
            margin-bottom: 0.3rem;
        }

        .menu-action-btn:hover {
            background: rgba(200, 155, 50, 0.2);
            border-color: var(--gold-bright);
        }

        .menu-close-btn {
            background: linear-gradient(180deg, #2a1f38 0%, #1a0f24 100%);

            border: 1px solid #b59246;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 700;

            transition: all 0.15s ease;
            font-family: var(--font-main);
            width: 100%;
            margin-top: 0.5rem;
            text-align: center;
        }

        .menu-close-btn:hover {
            background: #2a1f38;
            border-color: var(--gold-bright);
        }

        /* ─── GAMBLE OVERLAY ─── */
        .gamble-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .gamble-overlay.active {
            display: flex;
        }

        .gamble-box {
            background: radial-gradient(ellipse at 50% 30%, #1c1228, #0a0612);
            padding: 1.5rem;
            border-radius: 2.5rem;
            border: 2px solid var(--gold);
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 0 60px rgba(200, 150, 30, 0.2);
            position: relative;
            animation: gambleIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes gambleIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.92); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .gamble-box::before {
            content: '🎲';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            animation: diceRoll 1.2s ease-in-out infinite;
        }

        @keyframes diceRoll {
            0%, 100% { transform: translateX(-50%) rotate(0deg) scale(1); }
            25% { transform: translateX(-50%) rotate(90deg) scale(1.1); }
            75% { transform: translateX(-50%) rotate(-90deg) scale(0.9); }
        }

        .gamble-box h2 {
            color: var(--gold-bright);
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
            margin-top: 0.2rem;
        }

        .gamble-box p { color: #fbe3b5; font-size: 0.8rem; margin-bottom: 0.2rem; }
        .gamble-box .gamble-amount { font-size: 2.2rem; font-weight: 900; color: var(--gold-bright); margin: 0.3rem 0; text-shadow: 0 0 30px rgba(255, 200, 50, 0.3); }
        .gamble-choices { display: flex; gap: 1rem; margin: 1rem 0; justify-content: center; }

        .gamble-btn {
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;

            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s ease;

        .gamble-btn:hover { transform: scale(1.05); }
        .gamble-btn:active { transform: scale(0.95); }

        .gamble-btn.red {
            background: linear-gradient(180deg, #ee4444, #aa1111);

            box-shadow: 0 4px 0 #881111;

        .gamble-btn.red:hover { box-shadow: 0 4px 0 #881111, 0 0 30px rgba(255, 50, 50, 0.3); }

        .gamble-btn.black {
            background: linear-gradient(180deg, #333, #111);
            color: #fff;
            box-shadow: 0 4px 0 #0a0a0a;

        .gamble-btn.black:hover { box-shadow: 0 4px 0 #0a0a0a, 0 0 30px rgba(50, 50, 50, 0.3); border-color: #888; }

        .gamble-btn.collect {

            box-shadow: 0 4px 0 #7a5528;

            margin-top: 0.3rem;
            font-size: 0.9rem;
        }

        /* ─── CONFETTI ─── */
        #confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 500;
            overflow: hidden;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-8px) rotate(0deg) scale(1); opacity: 1; }
            30% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg) scale(0.2); opacity: 0; }
        }

        @keyframes confettiDrift {
            0% { margin-left: 0; }
            25% { margin-left: 20px; }
            75% { margin-left: -20px; }
            100% { margin-left: 0; }
        }

        @media (max-width: 420px) {
            .game-container { padding: 0.9rem 0.55rem 0.8rem; border-radius: 1.8rem; }

            .btn { font-size: 0.7rem; padding: 0.5rem 1rem; }
            .btn-spin { font-size: 0.85rem; }
            .bet-input { width: 60px; font-size: 0.75rem; padding: 0.45rem 0.25rem; }
            .balance-box { font-size: 0.7rem; padding: 0.25rem 0.7rem; }
            .jackpot-display { font-size: 0.6rem; padding: 0.15rem 0.7rem; }
            .message { font-size: 0.7rem; padding: 0.45rem; min-height: 2.2rem; }
            .gamble-box { padding: 1.5rem 1rem; }
            .gamble-box h2 { font-size: 1.2rem; }
            .gamble-box .gamble-amount { font-size: 1.6rem; }
            .gamble-btn { padding: 0.6rem 1.2rem; font-size: 0.85rem; min-width: 70px; }
            .dropdown-card { padding: 1.2rem; }
        }

        @media (max-width: 360px) {
            .reel-cell { font-size: 2.2rem; }
            .title { font-size: 1.4rem; letter-spacing: 3px; }
            .balance-box { font-size: 0.6rem; padding: 0.2rem 0.5rem; }
            .btn { font-size: 0.6rem; padding: 0.35rem 0.7rem; }
            .btn-spin { font-size: 0.75rem; }

        @media (min-width: 768px) {
            .game-container { padding: 2rem 2rem 1.6rem; border-radius: 3rem; }
            .reel-cell { font-size: 4.2rem; border-radius: 0.8rem; }

            .btn-spin { font-size: 1.2rem; padding: 0.8rem 2rem; width: 100px; height: 100px; }
            .balance-box { font-size: 1rem; padding: 0.4rem 1.5rem; }
            .message { font-size: 1rem; padding: 0.7rem; min-height: 3rem; }
            .quick-bet-btn { font-size: 0.75rem; padding: 0.35rem 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameContainer">
        <!-- HEADER -->
        <div class="header">
            <div class="header-title">
                <div class="title">GUMITE</div>
            </div>
            <div class="header-middle">
                <div class="balance-display">
                    <span class="bal-icon">💰</span>
                    <strong style="color:var(--gold-bright);margin-right:0.2rem;">BALANCE</strong>
                    <span id="balanceDisplay">10,000</span>
                </div>
            </div>
            <div class="header-bottom">
                <div class="jackpot-display" id="jackpotDisplay">🎯 JACKPOT <span id="jackpotValue">0</span></div>
            </div>
            <button class="icon-btn menu-btn" id="menuBtn" title="Menu">☰</button>
        </div>

        <!-- SLOT MACHINE WRAPPER -->
        <div class="slot-machine-wrapper">
            <div class="slot-machine" id="slotMachine">
                <div class="reels-container" id="reelsContainer">
                    <div class="reel-column" id="col0"></div>
                    <div class="reel-column" id="col1"></div>
                    <div class="reel-column" id="col2"></div>
                </div>
                <div class="win-lines-overlay" id="winLinesOverlay"></div>
                <div class="shimmer-overlay" id="shimmerOverlay"></div>
            </div>
        </div>

        <!-- CONTROLS AREA -->
        <div class="controls-area">
            <div class="quick-bets" id="quickBets">
                <button class="quick-bet-btn" data-bet="100">100</button>
                <button class="quick-bet-btn active" data-bet="500">500</button>
                <button class="quick-bet-btn" data-bet="1000">1K</button>
                <button class="quick-bet-btn" data-bet="5000">5K</button>
                <button class="quick-bet-btn" data-bet="10000">10K</button>
            </div>

            <div class="controls-row">
                <input type="number" class="bet-input" id="betInput" value="500" min="100" max="10000" step="50" inputmode="numeric">
                <button class="btn btn-spin" id="spinBtn">SPIN</button>
                <button class="btn btn-auto" id="autoBtn">AUTO</button>
            </div>

            <div class="message" id="message">✨ Press SPIN to play</div>

            <div class="footer">18+ · Play Responsibly · RTP ~96%</div>
        </div>
    </div>

    <!-- DROPDOWN MENU OVERLAY -->
    <div class="dropdown-overlay" id="dropdownOverlay">
        <div class="dropdown-card">
            <h3>MENU</h3>

            <!-- SPEED -->
            <div class="menu-section">
                <div class="menu-section-title">SPEED</div>
                <div class="menu-item">
                    <span class="label">Spin Speed</span>
                    <div class="control">
                        <button class="menu-btn-small active" data-speed="normal">Normal</button>
                        <button class="menu-btn-small" data-speed="fast">Fast</button>
                        <button class="menu-btn-small" data-speed="turbo">Turbo</button>
                    </div>
                </div>
            </div>

            <!-- SOUND -->
            <div class="menu-section">
                <div class="menu-section-title">AUDIO</div>
                <div class="menu-item">
                    <span class="label">Sound</span>
                    <div class="control">
                        <button class="menu-btn-small sound-toggle-btn active" id="menuSoundBtn">ON</button>
                    </div>
                </div>
            </div>

            <!-- PAYTABLE -->
            <div class="menu-section">
                <div class="menu-section-title">GAME INFO</div>
                <div class="menu-item">
                    <span class="label">Paytable</span>
                    <div class="control">
                        <button class="menu-action-btn" id="menuPaytableBtn">View Paytable</button>
                    </div>
                </div>
                <div class="menu-item">
                    <span class="label">History</span>
                    <div class="control">
                        <button class="menu-action-btn" id="menuHistoryBtn">View History</button>
                    </div>
                </div>
            </div>

            <!-- WALLET -->
            <div class="menu-section">
                <div class="menu-section-title">WALLET</div>
                <div class="menu-item">
                    <span class="label">Deposit</span>
                    <div class="control">
                        <button class="menu-action-btn" id="menuDepositBtn">Deposit</button>
                    </div>
                </div>
                <div class="menu-item">
                    <span class="label">Withdraw</span>
                    <div class="control">
                        <button class="menu-action-btn" id="menuWithdrawBtn">Withdraw</button>
                    </div>
                </div>
            </div>

            <!-- CLOSE -->
            <button class="menu-close-btn" id="menuCloseBtn">CLOSE MENU</button>
        </div>
    </div>

    <!-- GAMBLE OVERLAY -->
    <div class="gamble-overlay" id="gambleOverlay">
        <div class="gamble-box">
            <h2>DOUBLE OR NOTHING</h2>
            <p>You won</p>
            <div class="gamble-amount" id="gambleAmount">0</div>
            <p>Pick a card color:</p>
            <div class="gamble-choices">
                <button class="gamble-btn red" id="gambleRed">RED</button>
                <button class="gamble-btn black" id="gambleBlack">BLACK</button>
            </div>
            <button class="gamble-btn collect" id="gambleCollect">COLLECT</button>
        </div>
    </div>

    <!-- CONFETTI -->
    <div id="confetti"></div>

    <script>
        (function() {
            'use strict';

            // ═══════════════════════════════════════
            //  GUMITE ELITE SLOT · ENGINE v15
            // ═══════════════════════════════════════

            // Symbols: GU, MI, TE now ultra rare (weight 0.5)
            const SYMBOLS = ['🍒', '🍋', '🍊', '🍇', '🍀', '💎', '⭐', 'GU', 'MI', 'TE'];
            const SYMBOL_MULTIPLIER = { '🍒': 2, '🍋': 3, '🍊': 4, '🍇': 5, '🍀': 7, '💎': 12, '⭐': 25, 'GU': 250, 'MI': 250, 'TE': 250 };
            const SYMBOL_WEIGHTS = [22, 20, 17, 14, 11, 7, 3, 0.5, 0.5, 0.5];

            const WIN_LINES = [
                { name: 'Top Row', positions: [0, 1, 2] },
                { name: 'Middle Row', positions: [3, 4, 5] },
                { name: 'Bottom Row', positions: [6, 7, 8] },
                { name: 'Diagonal ↘', positions: [0, 4, 8] },
                { name: 'Diagonal ↙', positions: [2, 4, 6] },
            ];

            const $ = (id) => document.getElementById(id);
            const cols = [0, 1, 2].map(i => $('col' + i));
            const spinBtn = $('spinBtn');
            const autoBtn = $('autoBtn');
            const betInput = $('betInput');
            const messageEl = $('message');
            const balanceDisplay = $('balanceDisplay');
            const jackpotValue = $('jackpotValue');
            const winLinesOverlay = $('winLinesOverlay');
            const confettiContainer = $('confetti');
            const gameContainer = $('gameContainer');
            const slotMachine = $('slotMachine');
            const quickBets = document.querySelectorAll('.quick-bet-btn');
            const gambleOverlay = $('gambleOverlay');
            const gambleAmount = $('gambleAmount');
            const gambleRed = $('gambleRed');
            const gambleBlack = $('gambleBlack');
            const gambleCollect = $('gambleCollect');
            const shimmerOverlay = $('shimmerOverlay');

            // ── DROPDOWN MENU ────────────────────
            const menuBtn = $('menuBtn');
            const dropdownOverlay = $('dropdownOverlay');
            const menuCloseBtn = $('menuCloseBtn');
            const menuSpeedBtns = document.querySelectorAll('.menu-btn-small[data-speed]');
            const menuSoundBtn = $('menuSoundBtn');

            let balance = 10000;
            let betAmount = 500;
            let spinning = false;
            let autoMode = false;
            let autoTimer = null;
            let winStreak = 0;
            let soundEnabled = true;
            let spinSpeed = 'normal';
            let jackpot = 0;
            let gambleWin = 0;
            let lastResult = null;

            // ── MENU CONTROLS ────────────────────
            function toggleMenu(show) {
                if (show === undefined) {
                    show = !dropdownOverlay.classList.contains('active');
                }
                dropdownOverlay.classList.toggle('active', show);
                menuBtn.classList.toggle('active', show);
                if (show) {
                    menuSpeedBtns.forEach(b => b.classList.toggle('active', b.dataset.speed === spinSpeed));
                    menuSoundBtn.classList.toggle('active', soundEnabled);
                    menuSoundBtn.textContent = soundEnabled ? 'ON' : 'OFF';
                }
            }

            menuBtn.addEventListener('click', () => toggleMenu());
            menuCloseBtn.addEventListener('click', () => toggleMenu(false));
            dropdownOverlay.addEventListener('click', (e) => {
                if (e.target === dropdownOverlay) toggleMenu(false);
            });

            // ── MENU SPEED ──────────────────────
            menuSpeedBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    menuSpeedBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    spinSpeed = this.dataset.speed;
                    playTone(600, 0.06, 'sine', 0.03);
                });
            });

            // ── MENU SOUND ──────────────────────
            menuSoundBtn.addEventListener('click', function() {
                soundEnabled = !soundEnabled;
                this.classList.toggle('active', soundEnabled);
                this.textContent = soundEnabled ? 'ON' : 'OFF';
                if (soundEnabled) {
                    initAudio();
                    playTone(800, 0.08, 'sine', 0.04);
                }
            });

            // ── MENU PAYTABLE ───────────────────
            $('menuPaytableBtn').addEventListener('click', function() {
                let paytableText = 'PAYTABLE:\n\n';
                for (const [symbol, multiplier] of Object.entries(SYMBOL_MULTIPLIER)) {
                    if (symbol.length <= 2) {
                        paytableText += `${symbol} x${multiplier}\n`;
                    }
                }
                paytableText += '\nWin Lines:\n';
                WIN_LINES.forEach(line => {
                    paytableText += `• ${line.name}\n`;
                });
                paytableText += '\nRARE BONUS:\nGU + MI + TE on Middle Row = 250x';
                alert(paytableText);
                toggleMenu(false);
            });

            // ── MENU HISTORY ────────────────────
            $('menuHistoryBtn').addEventListener('click', function() {
                alert('Game history will be available in a future update.');
                toggleMenu(false);
            });

            // ── MENU DEPOSIT ────────────────────
            $('menuDepositBtn').addEventListener('click', function() {
                const amt = prompt('Deposit amount (UGX):', '1000');
                if (amt !== null) {
                    const val = parseInt(amt, 10);
                    if (!isNaN(val) && val > 0) {
                        balance += val;
                        updateBalanceUI();
                        messageEl.textContent = `📥 +${val.toLocaleString()} UGX`;
                        messageEl.className = 'message win';
                        sfxBalanceUpdate();
                    }
                }
                toggleMenu(false);
            });

            // ── MENU WITHDRAW ───────────────────
            $('menuWithdrawBtn').addEventListener('click', function() {
                const amt = prompt('Withdraw amount (UGX):', '500');
                if (amt !== null) {
                    const val = parseInt(amt, 10);
                    if (!isNaN(val) && val > 0 && val <= balance) {
                        balance -= val;
                        updateBalanceUI();
                        messageEl.textContent = `📤 -${val.toLocaleString()} UGX`;
                        messageEl.className = 'message';
                        sfxBalanceUpdate();
                    } else {
                        alert('Invalid amount or insufficient balance.');
                    }
                }
                toggleMenu(false);
            });

            // ── AUDIO ────────────────────────────
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        audioCtx = null;
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(() => {});
                }
            }

            function playTone(freq, duration, type = 'sine', volume = 0.06) {
                if (!soundEnabled || !audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(Math.max(20, Math.min(freq, 16000)), now);
                    gain.gain.setValueAtTime(Math.min(volume, 0.12), now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + duration + 0.02);
                } catch (e) { /* silent */ }
            }

            function sfxTick() { playTone(680 + Math.random() * 380, 0.022, 'sawtooth', 0.018); }
            function sfxColumnStop() { playTone(400, 0.12, 'triangle', 0.07);
                setTimeout(() => playTone(560, 0.05, 'square', 0.025), 45); }
            function sfxWin() { [523, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 0.18, 'sine', 0.06), i *
                    0.08)); }
            function sfxBigWin() { [262, 330, 392, 523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f,
                    0.16, i % 2 === 0 ? 'sine' : 'triangle', 0.08), i * 0.05)); }
            function sfxJackpot() { [262, 330, 392, 523, 659, 784, 1047, 1318].forEach((f, i) => setTimeout(() =>
                    playTone(f, 0.18, i % 3 === 0 ? 'sawtooth' : 'sine', 0.10), i * 0.04)); }
            function sfxLose() { playTone(210, 0.2, 'sine', 0.035);
                setTimeout(() => playTone(85, 0.18, 'sine', 0.028), 0.09); }
            function sfxNearMiss() { [500, 580, 660].forEach((f, i) => setTimeout(() => playTone(f, 0.05, 'sine', 0.035),
                    i * 0.04)); }
            function sfxGambleWin() { [523, 659].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 'sine', 0.07), i *
                    0.08)); }
            function sfxGambleLose() { playTone(150, 0.25, 'sine', 0.05);
                setTimeout(() => playTone(80, 0.2, 'sine', 0.03), 0.1); }
            function sfxBalanceUpdate() { playTone(880, 0.1, 'sine', 0.04);
                setTimeout(() => playTone(1100, 0.08, 'sine', 0.03), 60); }

            // ── RENDER ───────────────────────────
            function renderGrid(grid, winningPositions = null, isJackpot = false) {
                if (!grid || grid.length < 9) return;
                const winSet = new Set(winningPositions || []);
                cols.forEach((col, colIndex) => {
                    col.innerHTML = '';
                    for (let row = 0; row < 3; row++) {
                        const idx = row * 3 + colIndex;
                        const cell = document.createElement('div');
                        cell.className = 'reel-cell';
                        const symbol = grid[idx] || '🍒';
                        cell.textContent = symbol;
                        if (symbol === 'GU' || symbol === 'MI' || symbol === 'TE') {
                            cell.classList.add('rare-symbol');
                        }
                        if (winSet.has(idx)) {
                            cell.classList.add(isJackpot ? 'jackpot' : 'win');
                        }
                        col.appendChild(cell);
                    }
                });
            }

            function clearHighlights() {
                document.querySelectorAll('.reel-cell').forEach(c => c.classList.remove('win', 'jackpot', 'rare-symbol'));
                slotMachine.classList.remove('win-border', 'jackpot-border', 'gumite-bonus');
                gameContainer.classList.remove('gumite-bonus-active');
            }

            function setColumnSpinning(colIndex, isSpinning) {
                const col = cols[colIndex];
                if (isSpinning) {
                    col.classList.add('spinning');
                    col.classList.remove('stopped');

            function initializeReels() {
                const defaultGrid = ['🍒', '🍋', '🍊', '🍇', '🍀', '💎', '⭐', '🍒', '🍋'];
                renderGrid(defaultGrid);
            }
            initializeReels();

            // ── WEIGHTED SYMBOL PICKER ──────────
            function pickWeightedSymbol() {
                const totalWeight = SYMBOL_WEIGHTS.reduce((a, b) => a + b, 0);
                let roll = Math.random() * totalWeight;
                for (let i = 0; i < SYMBOLS.length; i++) {
                    roll -= SYMBOL_WEIGHTS[i];
                    if (roll <= 0) return SYMBOLS[i];
                }
                return SYMBOLS[SYMBOLS.length - 1];
            }

            // ── LOCAL RESULT GENERATOR ───────────
            function generateLocalResult() {
                const grid = [];
                for (let i = 0; i < 9; i++) {
                    grid.push(pickWeightedSymbol());
                }
                const winningLines = [];
                let totalWin = 0;
                const allWinningPositions = new Set();

                for (const line of WIN_LINES) {
                    const [a, b, c] = line.positions;
                    if (grid[a] === grid[b] && grid[b] === grid[c]) {
                        const multiplier = SYMBOL_MULTIPLIER[grid[a]] || 1;
                        const win = betAmount * multiplier;
                        totalWin += win;
                        line.positions.forEach(p => allWinningPositions.add(p));
                        winningLines.push({
                            name: line.name,
                            positions: [...line.positions],
                            symbol: grid[a],
                            multiplier: multiplier,
                            win: win
                        });
                    }
                }

                const isGumite = (grid[3] === 'GU' && grid[4] === 'MI' && grid[5] === 'TE');
                let gumiteTriggered = false;
                if (isGumite) {
                    const gumiteWin = betAmount * 250;
                    totalWin += gumiteWin;
                    [3, 4, 5].forEach(p => allWinningPositions.add(p));
                    winningLines.push({
                        name: 'GUMITE BONUS',
                        positions: [3, 4, 5],
                        symbol: 'GUMITE',
                        multiplier: 250,
                        win: gumiteWin
                    });
                    gumiteTriggered = true;
                }

                const hasJackpot = winningLines.some(wl => wl.symbol === '⭐');
                const isBigWin = totalWin >= betAmount * 6;
                return {
                    success: true,
                    grid,
                    win: totalWin,
                    winningLines,
                    allWinningPositions: [...allWinningPositions],
                    isJackpot: hasJackpot,
                    isBigWin: isBigWin,
                    multiplier: totalWin / betAmount,
                    isGumite: gumiteTriggered
                };
            }

            // ── NEAR MISS CHECK ──────────────────
            function checkNearMiss(grid) {
                if (!grid || grid.length < 9) return false;
                for (const line of WIN_LINES) {
                    const [a, b, c] = line.positions;
                    if ((grid[a] === grid[b] && grid[a] !== grid[c]) ||
                        (grid[a] === grid[c] && grid[a] !== grid[b]) ||
                        (grid[b] === grid[c] && grid[b] !== grid[a])) {
                        return true;
                    }
                }
                return false;
            }

            // ── DRAW WIN LINES ───────────────────
            function drawWinLines(winningLines) {
                winLinesOverlay.innerHTML = '';
                if (!winningLines || winningLines.length === 0) return;

                requestAnimationFrame(() => {
                    const reelsRect = reelsContainer.getBoundingClientRect();
                    const slotRect = slotMachine.getBoundingClientRect();
                    if (reelsRect.width < 10 || reelsRect.height < 10) return;

                    const canvas = document.createElement('canvas');
                    const dpr = window.devicePixelRatio || 1;
                    const width = reelsRect.width;
                    const height = reelsRect.height;
                    canvas.width = width * dpr;
                    canvas.height = height * dpr;
                    canvas.style.cssText = `
                        position: absolute;
                        top: ${reelsRect.top - slotRect.top}px;
                        left: ${reelsRect.left - slotRect.left}px;
                        width: ${width}px;
                        height: ${height}px;
                        pointer-events: none;
                    `;
                    const ctx = canvas.getContext('2d');
                    ctx.scale(dpr, dpr);
                    const cellW = width / 3;
                    const cellH = height / 3;

                    const sortedLines = [...winningLines].sort((a, b) => (b.multiplier || 0) - (a.multiplier || 0));

                    sortedLines.forEach((line) => {
                        const positions = line.positions || [];
                        if (positions.length < 3) return;
                        const isJackpotLine = line.symbol === '⭐';
                        const isGumiteLine = line.symbol === 'GUMITE';
                        const isBigWinLine = (line.multiplier || 0) >= 6;

                        const gradient = ctx.createLinearGradient(0, 0, width, height);
                        if (isJackpotLine || isGumiteLine) {
                            gradient.addColorStop(0, '#FFD700');
                            gradient.addColorStop(0.5, '#FFAA00');
                            gradient.addColorStop(1, '#FFD700');
                        } else if (isBigWinLine) {
                            gradient.addColorStop(0, '#FF6B00');
                            gradient.addColorStop(0.5, '#FFB82E');
                            gradient.addColorStop(1, '#FF6B00');
                        } else {
                            gradient.addColorStop(0, '#FFB82E');
                            gradient.addColorStop(0.5, '#FFDD55');
                            gradient.addColorStop(1, '#FFB82E');
                        }

                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = (isJackpotLine || isGumiteLine) ? 5 : (isBigWinLine ? 4 : 3);
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.shadowColor = (isJackpotLine || isGumiteLine) ? '#FFAA00' : (isBigWinLine ? '#FF7700' : '#FF5500');
                        ctx.shadowBlur = (isJackpotLine || isGumiteLine) ? 28 : (isBigWinLine ? 20 : 14);
                        ctx.globalAlpha = 0.92;

                        const pts = positions.map(idx => ({
                            x: (idx % 3) * cellW + cellW / 2,
                            y: Math.floor(idx / 3) * cellH + cellH / 2
                        }));

                        ctx.beginPath();
                        ctx.moveTo(pts[0].x, pts[0].y);
                        if (pts.length === 3) {
                            const mid = pts[1];
                            ctx.quadraticCurveTo(mid.x, mid.y, pts[2].x, pts[2].y);
                        } else {
                            for (let i = 1; i < pts.length; i++) {
                                ctx.lineTo(pts[i].x, pts[i].y);
                            }
                        }
                        ctx.stroke();

                        pts.forEach((p) => {
                            const radius = (isJackpotLine || isGumiteLine) ? 8 : (isBigWinLine ? 6 : 5);
                            ctx.shadowBlur = (isJackpotLine || isGumiteLine) ? 24 : (isBigWinLine ? 16 : 10);
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                            ctx.fillStyle = gradient;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, radius * 0.4, 0, Math.PI * 2);
                            ctx.fillStyle = '#FFFFFF';
                            ctx.globalAlpha = 0.6;
                            ctx.fill();
                            ctx.globalAlpha = 0.92;
                        });
                    });

                    winLinesOverlay.appendChild(canvas);

                    setTimeout(() => {
                        if (winLinesOverlay.contains(canvas)) {
                            winLinesOverlay.removeChild(canvas);
                        }
                    }, 2800);
                });
            }

            // ── JACKPOT GLOW ────────────────────
            function setJackpotGlow(on) {

                    gameContainer.classList.add('jackpot-glow');
                    slotMachine.classList.add('jackpot-border');

            // ── CONFETTI ─────────────────────────
            function spawnConfetti(intense = false) {
                confettiContainer.innerHTML = '';
                const count = intense ? 150 : 55;
                const colors = ['#FFD700', '#FF8C00', '#FF4500', '#00FF88', '#00BFFF', '#FF69B4', '#FFFFFF',
                    '#FFD700', '#FF6347', '#7FFF00', '#FF1493', '#00FFFF'
                ];
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < count; i++) {
                    const piece = document.createElement('div');
                    const size = intense ? (6 + Math.random() * 8) : (4 + Math.random() * 6);
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const left = Math.random() * 100;
                    const duration = 1.2 + Math.random() * 2.8;
                    const delay = Math.random() * 0.6;
                    const shape = Math.random() > 0.5 ? '50%' : '2px';
                    const rotation = Math.random() * 360;
                    piece.style.cssText = `
                        position: absolute;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${color};
                        left: ${left}%;
                        top: -20px;
                        border-radius: ${shape};
                        transform: rotate(${rotation}deg);
                        animation: confettiFall ${duration}s linear ${delay}s forwards, confettiDrift ${duration * 0.7}s ease-in-out ${delay}s infinite;
                        pointer-events: none;
                    `;
                    fragment.appendChild(piece);
                }
                confettiContainer.appendChild(fragment);
                setTimeout(() => { confettiContainer.innerHTML = ''; }, (intense ? 4.5 : 3.0) * 1000);

            // ── SHIMMER EFFECT ──────────────────
            function triggerShimmer() {

            function forceUnlockSpin(overrideMsg) {

                }

            // ── APPLY RESULT ────────────────────
            function applyResult(result) {
                if (!result || !result.grid) {
                    forceUnlockSpin('⚠️ Spin error — try again');
                    return;
                }

                const safeResult = {
                    grid: result.grid || ['🍒', '🍋', '🍊', '🍇', '🍀', '💎', '⭐', '🍒', '🍋'],
                    win: result.win || 0,
                    winningLines: result.winningLines || [],
                    allWinningPositions: result.allWinningPositions || [],
                    isJackpot: result.isJackpot || false,
                    isBigWin: result.isBigWin || false,
                    multiplier: result.multiplier || 0,
                    isGumite: result.isGumite || false,
                };

                renderGrid(safeResult.grid, safeResult.allWinningPositions, safeResult.isJackpot);

                if (safeResult.win > 0) {
                    balance += safeResult.win;
                    winStreak++;
                    jackpot += Math.floor(betAmount * 0.02);
                    updateBalanceUI();
                    updateStreakUI();
                    updateJackpotUI();

                    const winMultiplier = safeResult.win / betAmount;
                    let msgClass = 'message';
                    let messageText = '';

                    if (safeResult.isGumite) {
                        messageText = `🏆 GUMITE BONUS! +${safeResult.win.toLocaleString()} UGX!`;
                        msgClass = 'message jackpot';
                        sfxJackpot();
                        spawnConfetti(true);
                        setJackpotGlow(true);
                        triggerShimmer();
                        gameContainer.classList.add('gumite-bonus-active');
                        slotMachine.classList.add('gumite-bonus');
                        setTimeout(() => {
                            gameContainer.classList.remove('gumite-bonus-active');
                            slotMachine.classList.remove('gumite-bonus');
                            setJackpotGlow(false);
                        }, 3500);
                    } else if (safeResult.isJackpot || winMultiplier >= 15) {
                        messageText = `🎰 JACKPOT! +${safeResult.win.toLocaleString()} UGX`;
                        msgClass = 'message jackpot';
                        sfxJackpot();
                        spawnConfetti(true);
                        setJackpotGlow(true);
                        triggerShimmer();
                        setTimeout(() => setJackpotGlow(false), 2800);
                    } else if (safeResult.isBigWin || winMultiplier >= 6) {
                        messageText = `🌟 BIG WIN! +${safeResult.win.toLocaleString()} UGX`;
                        msgClass = 'message big-win';
                        sfxBigWin();
                        spawnConfetti(true);
                        triggerShimmer();
                        slotMachine.classList.add('win-border');
                        setTimeout(() => slotMachine.classList.remove('win-border'), 1200);
                    } else if (winMultiplier >= 2) {
                        messageText = `🔥 Nice Win! +${safeResult.win.toLocaleString()} UGX`;
                        msgClass = 'message win';
                        sfxWin();
                        spawnConfetti(false);
                        slotMachine.classList.add('win-border');
                        setTimeout(() => slotMachine.classList.remove('win-border'), 800);
                    } else {
                        messageText = `✅ Win! +${safeResult.win.toLocaleString()} UGX`;
                        msgClass = 'message win';
                        sfxWin();
                    }

                    messageEl.textContent = messageText;
                    messageEl.className = msgClass;

                    if (safeResult.winningLines && safeResult.winningLines.length > 0) {
                        drawWinLines(safeResult.winningLines);
                    }

                    if (safeResult.win >= betAmount * 5) {
                        gambleWin = safeResult.win;
                        setTimeout(() => {
                            if (gambleWin > 0 && !spinning && !autoMode) {
                                openGamble();
                            }
                        }, 600);
                    }
                } else {
                    winStreak = 0;
                    updateStreakUI();
                    const nearMiss = checkNearMiss(safeResult.grid);
                    if (nearMiss) {
                        messageEl.textContent = '😲 So close! Almost!';
                        messageEl.className = 'message near-miss';
                        sfxNearMiss();
                    } else {
                        messageEl.textContent = '💨 No win. Spin again!';
                        messageEl.className = 'message loss';
                        sfxLose();
                    }
                }

                lastResult = safeResult;
            }

            // ── SPIN ANIMATION ──────────────────
            function runSpinAnimation(finalGrid) {
                return new Promise((resolve) => {
                    const baseDelays = [120, 250, 380];
                    let columnStopDelays;
                    switch (spinSpeed) {
                        case 'fast':
                            columnStopDelays = [80, 160, 240];
                            break;
                        case 'turbo':
                            columnStopDelays = [40, 80, 120];
                            break;
                        default:
                            columnStopDelays = baseDelays;
                    }
                    const tickInterval = spinSpeed === 'turbo' ? 20 : spinSpeed === 'fast' ? 30 : 40;
                    const totalDuration = columnStopDelays[2] + (spinSpeed === 'turbo' ? 80 : 120);
                    const columnsLocked = [false, false, false];

                    [0, 1, 2].forEach(i => setColumnSpinning(i, true));

                    const ticker = setInterval(() => {
                        for (let c = 0; c < 3; c++) {
                            if (columnsLocked[c]) continue;
                            const cells = cols[c].querySelectorAll('.reel-cell');
                            cells.forEach((cell) => {
                                cell.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                            });
                            if (Math.random() < 0.2) sfxTick();
                        }
                    }, tickInterval);

                    columnStopDelays.forEach((delay, colIndex) => {
                        setTimeout(() => {
                            columnsLocked[colIndex] = true;
                            setColumnSpinning(colIndex, false);
                            sfxColumnStop();
                            const cells = cols[colIndex].querySelectorAll('.reel-cell');
                            for (let row = 0; row < 3; row++) {
                                const idx = row * 3 + colIndex;
                                const symbol = finalGrid[idx] || '🍒';
                                cells[row].textContent = symbol;
                                cells[row].classList.remove('dropping');
                                void cells[row].offsetWidth;
                                cells[row].classList.add('dropping');
                            }
                        }, delay);
                    });

                    setTimeout(() => {
                        clearInterval(ticker);
                        for (let c = 0; c < 3; c++) {
                            setColumnSpinning(c, false);
                            columnsLocked[c] = true;
                            const cells = cols[c].querySelectorAll('.reel-cell');
                            for (let row = 0; row < 3; row++) {
                                const idx = row * 3 + c;
                                cells[row].textContent = finalGrid[idx] || '🍒';
                                cells[row].classList.remove('dropping');
                            }
                        }
                        resolve();
                    }, totalDuration + 50);
                });
            }

            // ── MAIN SPIN ────────────────────────
            async function spin() {
                if (spinning) return;
                initAudio();

                betAmount = parseInt(betInput.value, 10);
                if (isNaN(betAmount) || betAmount < 100) {
                    betAmount = 100;
                    betInput.value = 100;
                    messageEl.textContent = '⚠️ Minimum bet is 100 UGX';
                    messageEl.className = 'message';
                    return;
                }
                if (betAmount > 10000) {
                    betAmount = 10000;
                    betInput.value = 10000;
                }
                if (betAmount > balance) {
                    messageEl.textContent = '⚠️ Insufficient balance';
                    messageEl.className = 'message loss';
                    if (autoMode) toggleAuto(false);
                    return;
                }

                spinning = true;
                spinBtn.disabled = true;
                messageEl.textContent = '🎡 Spinning...';
                messageEl.className = 'message';
                winLinesOverlay.innerHTML = '';
                clearHighlights();
                setJackpotGlow(false);
                gambleWin = 0;

                balance -= betAmount;
                updateBalanceUI();

                const localResult = generateLocalResult();
                let finalResult = localResult;

                const animationPromise = runSpinAnimation(localResult.grid);

                let serverResult = null;
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 400);
                    const response = await fetch('https://gumite-slot-api.onrender.com/api/spin', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': 'test_api_key_123',
                        },
                        body: JSON.stringify({ playerId: 'gumite_' + Date.now(), betAmount: betAmount }),
                        signal: controller.signal,
                    });
                    clearTimeout(timeoutId);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.success && data.grid && data.grid.length >= 9) {
                            const wl = data.winningLines || [];
                            const allPos = new Set();
                            wl.forEach(w => { if (w.positions) w.positions.forEach(p => allPos.add(p)); });
                            const hasJackpot = data.win >= betAmount * 15;
                            const isBigWin = data.win >= betAmount * 6;
                            serverResult = {
                                success: true,
                                grid: data.grid,
                                win: data.win || 0,
                                winningLines: wl,
                                allWinningPositions: [...allPos],
                                isJackpot: hasJackpot,
                                isBigWin: isBigWin,
                                multiplier: data.win / betAmount,
                                isGumite: false
                            };
                        }
                    }
                } catch (e) { /* silent fallback */ }

                if (serverResult && serverResult.grid && serverResult.grid.length >= 9) {
                    const localGumite = localResult.isGumite || false;
                    finalResult = {
                        ...serverResult,
                        isGumite: localGumite
                    };
                }

                await animationPromise;

                try {
                    applyResult(finalResult);
                } catch (e) {
                    console.warn('applyResult error:', e);
                    messageEl.textContent = '✅ Spin complete!';
                    messageEl.className = 'message';
                }

                forceUnlockSpin();

                if (autoMode && balance >= betAmount && !spinning) {
                    autoTimer = setTimeout(() => {
                        if (autoMode && !spinning && balance >= betAmount) {
                            spin();
                        } else if (autoMode && balance < betAmount) {
                            toggleAuto(false);
                        }
                    }, 600);
                } else if (autoMode && balance < betAmount) {
                    toggleAuto(false);
                }
            }

            function toggleAuto(forceState) {
                if (typeof forceState === 'boolean') {
                    autoMode = forceState;
                } else {
                    autoMode = !autoMode;
                }

                if (autoMode) {
                    autoBtn.classList.add('active');

                        spin();

                        messageEl.textContent = '⚠️ Insufficient balance for auto';
                        messageEl.className = 'message loss';
                        autoMode = false;
                        autoBtn.classList.remove('active');
                        autoBtn.textContent = 'AUTO';

                    autoBtn.textContent = 'AUTO';

                        clearTimeout(autoTimer);

                        messageEl.className = 'message';

                } else if (e.code === 'KeyA') {
                    e.preventDefault();
                    toggleAuto();
                } else if (e.code === 'KeyG' && gambleWin > 0) {
                    e.preventDefault();
                    openGamble();
                }
            });

            betInput.addEventListener('input', () => {
                let val = parseInt(betInput.value, 10);
                if (isNaN(val) || val < 100) betInput.value = 100;
                else if (val > 10000) betInput.value = 10000;
            });
            betInput.addEventListener('change', () => {
                let val = parseInt(betInput.value, 10);
                if (isNaN(val) || val < 100) betInput.value = 100;
                if (val > 10000) betInput.value = 10000;
                betAmount = parseInt(betInput.value, 10);
                quickBets.forEach(b => b.classList.remove('active'));
                quickBets.forEach(b => {
                    if (parseInt(b.dataset.bet, 10) === betAmount) {
                        b.classList.add('active');
                    }
                });
                updateBalanceUI();
            });
            betInput.addEventListener('blur', () => {
                let val = parseInt(betInput.value, 10);
                if (isNaN(val) || val < 100) betInput.value = 100;
                if (val > 10000) betInput.value = 10000;
                betAmount = parseInt(betInput.value, 10);
            });

            // ── RESIZE HANDLER ────────────────────
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (lastResult && lastResult.winningLines && lastResult.winningLines.length > 0) {
                        drawWinLines(lastResult.winningLines);
                    }
                }, 300);
            });

            // ── INIT ──────────────────────────────
            updateBalanceUI();
            updateJackpotUI();
            messageEl.textContent = '✨ Press SPIN to play';
            messageEl.className = 'message';
            betInput.value = betAmount;

            console.log('🎰 GUMITE ELITE SLOT · v15');
            console.log('   Sound:', soundEnabled ? 'ON' : 'OFF');
            console.log('   Press G for gamble');
            console.log('   🏆 GUMITE Bonus is now ULTRA RARE (weights: 0.5 each)');
        })();
    </script>
</body>
</html>
